version: '3.8'

services:
  # Jenkins Master - Core CI/CD Orchestration
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: deliveryd-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"      # Jenkins UI
      - "50000:50000"    # Jenkins agent communication
    environment:
      - JENKINS_OPTS=--prefix=/jenkins
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2g
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
      - DOCKERHUB_TOKEN=${DOCKERHUB_TOKEN}
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker access
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - ./shared:/shared:rw  # Shared workspace for artifacts
    networks:
      - deliveryd-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/jenkins/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # SonarQube - SAST (Static Application Security Testing)
  sonarqube:
    image: sonarqube:10-community
    container_name: deliveryd-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - deliveryd-network
    depends_on:
      - sonarqube-db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # PostgreSQL for SonarQube
  sonarqube-db:
    image: postgres:15-alpine
    container_name: deliveryd-sonarqube-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar}
      - POSTGRES_DB=sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - deliveryd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OWASP Dependency-Check - Dependency Vulnerability Scanning
  dependency-check:
    image: owasp/dependency-check:latest
    container_name: deliveryd-dependency-check
    restart: "no"  # On-demand service
    volumes:
      - dependency_check_data:/usr/share/dependency-check/data
      - ./shared:/src:ro
      - ./shared/reports:/report:rw
    networks:
      - deliveryd-network
    command: ["--help"]  # Default command, will be overridden

  # Pack CLI - Cloud Native Buildpacks
  pack-cli:
    build:
      context: ./pack
      dockerfile: Dockerfile
    container_name: deliveryd-pack
    restart: "no"  # On-demand service
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pack_cache:/pack-cache
      - ./shared:/workspace:rw
    networks:
      - deliveryd-network
    environment:
      - PACK_CACHE_DIR=/pack-cache
    command: ["--help"]  # Default command, will be overridden

  # Nexus Repository (Optional) - Artifact Repository
  # nexus:
  #   image: sonatype/nexus3:latest
  #   container_name: deliveryd-nexus
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #     - "8082:8082"  # Docker registry
  #   volumes:
  #     - nexus_data:/nexus-data
  #   networks:
  #     - deliveryd-network
  #   environment:
  #     - INSTALL4J_ADD_VM_PARAMS=-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m

volumes:
  jenkins_home:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  sonarqube_db:
    driver: local
  dependency_check_data:
    driver: local
  pack_cache:
    driver: local
  # nexus_data:
  #   driver: local

networks:
  deliveryd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
