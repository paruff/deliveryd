apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenkins
  namespace: deliveryd
  labels:
    app: jenkins
spec:
  serviceName: jenkins
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000
      containers:
      - name: jenkins
        image: deliveryd/jenkins:latest  # Build and push your custom image
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        - name: agent
          containerPort: 50000
        env:
        - name: JENKINS_OPTS
          value: "--prefix=/jenkins"
        - name: JAVA_OPTS
          value: "-Djenkins.install.runSetupWizard=false -Xmx2g"
        - name: DOCKERHUB_USERNAME
          valueFrom:
            secretKeyRef:
              name: dockerhub-credentials
              key: username
        - name: DOCKERHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: dockerhub-credentials
              key: token
        - name: JENKINS_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: jenkins-admin
              key: username
              optional: true
        - name: JENKINS_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jenkins-admin
              key: password
              optional: true
        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        - name: docker-sock
          mountPath: /var/run/docker.sock
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /jenkins/login
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /jenkins/login
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-pvc
      # WARNING: Mounting Docker socket poses security risks
      # For production, consider:
      # 1. Docker-in-Docker (DinD) sidecar container
      # 2. Kaniko for building images without Docker
      # 3. Kubernetes-native builders (e.g., Tekton, BuildKit)
      # See: https://jpetazzo.github.io/2015/09/03/do-not-use-docker-in-docker-for-ci/
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket
