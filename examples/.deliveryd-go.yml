# Example: Go Application
app:
  name: go-service
  type: service
  language: go
  version: 1.0.0

build:
  builder: cnb
  cnb:
    builder: paketobuildpacks/builder:base
    env:
      BP_GO_VERSION: "1.21"
  image:
    registry: docker.io
    namespace: myorg
    name: go-service
    tags:
      - "${GIT_COMMIT_SHORT}"
      - "latest"

stages:
  lint:
    enabled: true
    commands:
      - language: go
        cmd: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

  test:
    enabled: true
    commands:
      - language: go
        cmd: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
    coverage:
      enabled: true
      threshold: 80
      report: coverage.out

  sast:
    enabled: true
    trivy:
      enabled: true

  dependency_scan:
    enabled: true
    tools:
      - trivy
    fail_on: HIGH

  build:
    enabled: true

  image_scan:
    enabled: true
    severity: CRITICAL
    fail_on: CRITICAL

  push:
    enabled: true

advanced:
  timeout: 20
  workspace:
    cleanup: true
