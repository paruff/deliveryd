jenkins:
  systemMessage: "deliveryd - Integration & Delivery Plane\n\nAutomated CI/CD Platform for Polyglot Applications"
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 3
  
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-changeme}"
          name: "Admin User"
          
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"
        - "Overall/Read:authenticated"
        - "Job/Build:authenticated"
        - "Job/Cancel:authenticated"
        - "Job/Read:authenticated"
        - "View/Read:authenticated"

  remotingSecurity:
    enabled: true

  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: false

  # Global Pipeline Libraries
  globalLibraries:
    libraries:
      - name: "deliveryd-pipeline-library"
        retriever:
          modernSCM:
            scm:
              git:
                remote: "https://github.com/paruff/deliveryd"
                credentialsId: ""
        defaultVersion: "main"
        implicit: false
        allowVersionOverride: true

unclassified:
  location:
    url: "http://localhost:8080/jenkins/"
    
  # SonarQube Configuration
  sonarGlobalConfiguration:
    installations:
      - name: "SonarQube"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"
        
  # Generic Webhook Trigger Configuration (for external plane integration)
  globalConfigFiles:
    configs:
      - json:
          id: "deliveryd-pipeline-contract"
          name: "deliveryd Pipeline Contract Schema"
          comment: "JSON Schema for .deliveryd.yml validation"
          
credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "dockerhub-credentials"
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_TOKEN}"
              description: "DockerHub Registry Credentials"
          - string:
              scope: GLOBAL
              id: "webhook-secret"
              secret: "${WEBHOOK_SECRET:-changeme}"
              description: "Webhook Secret for External Triggers"
          - string:
              scope: GLOBAL  
              id: "sonarqube-token"
              secret: "${SONAR_TOKEN:-squ_default_token}"
              description: "SonarQube Authentication Token"

jobs:
  - script: >
      folder('pipelines') {
        displayName('Application Pipelines')
        description('Automated CI/CD pipelines for applications')
      }
  - script: >
      folder('system') {
        displayName('System Jobs')
        description('Platform maintenance and administrative jobs')
      }
  - script: >
      pipelineJob('system/seed-job') {
        description('Job DSL seed job to generate pipeline jobs from repository configuration')
        definition {
          cps {
            script("""
              // This is a placeholder seed job
              // In production, this would scan repositories and create pipeline jobs
              println 'Seed job executed. Implement repository scanning logic here.'
            """)
            sandbox(true)
          }
        }
      }
  - script: >
      pipelineJob('pipelines/example-polyglot-pipeline') {
        description('Example polyglot pipeline following deliveryd contract')
        parameters {
          stringParam('REPO_URL', '', 'Git repository URL')
          stringParam('BRANCH', 'main', 'Branch to build')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('$REPO_URL')
                }
                branches('$BRANCH')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
